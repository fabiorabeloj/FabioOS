# Exemplo de composicao modular do MEGATRON.
# Nao contem segredos. Nao executar sem revisar volumes, portas e .env local.
#
# Perfis sugeridos:
#   core: servicos sempre ligados no MEGATRON Core
#   vector-next: banco vetorial HTTP futuro
#   gpu: inferencia local quando houver GPU Node
#   data: banco estruturado futuro
#   observability: metricas/logs futuros

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    profiles: ["core"]
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../../..:/vault:ro
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["vector-next"]
    ports:
      - "6333:6333"
      - "6334:6334"
      - "6335:6335"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16
    profiles: ["data"]
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=fabioos
      - POSTGRES_USER=fabioos
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    profiles: ["gpu"]
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  n8n_data:
  qdrant_data:
  postgres_data:
  ollama_data:
  open_webui_data:
